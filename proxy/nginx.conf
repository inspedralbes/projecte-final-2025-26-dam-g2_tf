server {
  listen 80;
  server_name north.dam.inspedralbes.cat ;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name north.dam.inspedralbes.cat ;

  ssl_certificate     /etc/letsencrypt/live/north.dam.inspedralbes.cat/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/north.dam.inspedralbes.cat/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    proxy_pass http://backend:8088/api/; 
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /socket.io/ {
    proxy_pass http://backend:8088/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
location /foto_mapa/ {
    # Redirigimos las peticiones de fotos directamente al backend
    proxy_pass http://backend:8088/foto_mapa/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /fotos_historiques/ {
    # Redirigimos las peticiones de fotos históricas directamente al backend
    proxy_pass http://backend:8088/fotos_historiques/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /fotos_partides_usuaris/ {
    # Redirigimos las peticiones de fotos de usuarios al backend
    proxy_pass http://backend:8088/fotos_partides_usuaris/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location /fotos_actuals/ {
    # Redirigimos las peticiones de fotos actuals al backend
    proxy_pass http://backend:8088/fotos_actuals/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

location / {
    proxy_pass http://frontend:80/;
    proxy_redirect off;
}
}