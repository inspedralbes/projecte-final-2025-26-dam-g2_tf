version: "3"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "80"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8088"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8088
    volumes:
      - ./backend/public/foto_mapa:/app/public/foto_mapa
      - ./backend/public/fotos_partides_usuaris:/app/public/fotos_partides_usuaris
      - ./.env:/app/.env:ro

  proxy:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
