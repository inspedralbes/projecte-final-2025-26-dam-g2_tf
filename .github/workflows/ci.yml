#FITXER DE CI/CD: Tests automàtics en cada push

name: "Tests Automàtics CI"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# JOBS: Les tasques que s'executaran

jobs:

  # JOB 1: Tests del Backend (Jest + Supertest)

  backend-tests:
    name: "Tests del Backend"
    runs-on: ubuntu-latest  

    steps:
      - name: "Descarregar el codi"
        uses: actions/checkout@v4

      - name: " Configurar Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: " Instal·lar dependències del backend"
        run: npm ci
        working-directory: backend

      # Pas 4: Executar els tests
      - name: "Executar tests del backend"
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

  
  # JOB 2: Tests del Frontend (Vitest)
 
  frontend-tests:
    name: "Tests del Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: "Descarregar el codi"
        uses: actions/checkout@v4

      - name: "Configurar Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: "Instal·lar dependències del frontend"
        run: npm ci
        working-directory: frontend

      - name: "Executar tests del frontend"
        run: npm test
        working-directory: frontend
        env:
          NODE_ENV: test
          VITE_API_URL: "https://north.dam.inspedralbes.cat"

 
  # JOB 3: Verificació del Build 
 
  build-check:
    name: "Verificació del Build"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: "Descarregar el codi"
        uses: actions/checkout@v4

      - name: "Configurar Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: "Instal·lar dependències"
        run: npm ci
        working-directory: frontend

      - name: "Compilar el frontend"
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: "https://north.dam.inspedralbes.cat"
